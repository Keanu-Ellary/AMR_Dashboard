name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './amr-dashboard/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ./amr-dashboard

      - name: Lint
        run: npm run lint
        working-directory: ./amr-dashboard

      - name: Run Tests
        run: npm run test
        working-directory: ./amr-dashboard
        