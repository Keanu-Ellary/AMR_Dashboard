name: Production Deployment

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  production-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './amr-dashboard/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ./amr-dashboard

      - name: Run tests
        run: npm run test
        working-directory: ./amr-dashboard

  build-and-push:
    needs: production-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Build and push Next.js Application
        uses: docker/build-push-action@v5
        with:
          context: ./amr-dashboard
          file: ./amr-dashboard/Dockerfile
          push: true
          tags: ghcr.io/${{github.repository_owner}}/amr_dashboard/next-app:latest
          build-args: |
            DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy

      - name: Build and push AI Lambda
        uses: docker/build-push-action@v5
        with:
          context: ./amr-dashboard/ai-lambda
          file: ./amr-dashboard/ai-lambda/Dockerfile
          push: true
          tags: ghcr.io/${{github.repository_owner}}/amr_dashboard/ai-lambda:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setting up SSH to instance
        run: |
          mkdir -p ~/.ssh
          echo "${{secrets.EC2_SSH_KEY}}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{secrets.EC2_HOST}} >> ~/.ssh/known_hosts

      - name: Copy compose file
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{secrets.EC2_HOST}} "mkdir -p ~/app"
          rsync -az -e "ssh -i ~/.ssh/id_rsa" ./amr-dashboard/docker-compose.yml ubuntu@${{secrets.EC2_HOST}}:~/app/

      - name: SSH into instance and pull from registry
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{secrets.EC2_HOST}} << 'EOF'
            cd ~/app

            echo "${{secrets.GITHUB_TOKEN}}" | docker login ghcr.io -u ${{github.actor}} --password-stdin

            docker compose pull

            docker compose down || true
            docker compose up -d --remove-orphans

            docker image prune -a -f
          EOF